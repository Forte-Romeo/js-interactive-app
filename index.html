<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForteFilms - Movie Search App</title>
</head>
<body>
    <!--HEADER/NAVBAR SECTION-->
    <header class="navbar">
        <nav>
            <div class="head-icon">
                <a href="index.html">ForteFilms</a>
            </div>

            <div class="nav-links">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#Upcoming">Upcoming</a></li>
                    <li><a href="#Movies">Movies</a></li>
                    <li><a href="#TV Shows">TV Shows</a></li>
                </ul>
            </div>

            <form action="#" class="header-search">
                <input type="text" placeholder="Enter movie name...">
                <button type="submit"> Search </button>
            </form>
        </nav>
    </header>

    <!--DISCOVER/SEARCH MOVIES SECTION-->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Discover Movies & TV Shows</h1>
            <p>
                Explore trending movies, upcoming releases, and the most popular TV shows from around the world.
            </p>

            <div class="hero-search">
                <input type="text" id="mainSearch" placeholder="Search for movies, TV shows...">
                <button id="searchBtn">
                    Search
                </button>
            </div>
        </div>
    </section>

    <!--SEARCH RESULTS-->
    <section class="search-results">
        <div class="section-header">
            <h2>Search Results</h2>
        </div>

        <div class="movies-grid" id="searchResultsContainer">
            <!-- JavaScript Search Results Go Here-->
        </div>
    </section>

    <!--UPCOMING MOVIES & TV SHOWS SECTION-->
    <section class="upcoming-sec" id="Upcoming">
        <div class="section-header">
            <h2>Upcoming Movies & TV Shows</h2>

            <div class="carousel-controls">
                <button class="prev-btn">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>

                <button class="next-btn">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <div id="upcomingContainer" class="movie-carousel">
            <!-- JavaScript Upcoming Cards -->
        </div>
    </section>

    <!--TRENDING MOVIES SECTION-->
    <section class="movies-sec" id="Movies">
        <div class="section-header">
            <h2>Trending Movies</h2>

            <div class="carousel-controls">
                <button class="prev-btn">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>

                <button class="next-btn">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <div id="trendingMoviesContainer" class="movie-carousel">
            <!-- JavaScript Trending Movies -->
        </div>
    </section>

    <!--TRENDING TV SHOWS SECTION-->
    <section class="new-tvshows-sec" id="TV Shows">
    </section>

    <!--FOOTER SECTION-->
    <footer>
    </footer>
    
</body>
</html>
